# ================================================================
# FREEPLAY ゲームテンプレート
# 自由参加・退出モード。死亡するとロビーに戻り、何度でも参加できる。
# win-condition は NONE（勝利なし、際限ない継続）
# ================================================================

id: freeplay_example
display-name: "Free Play"
mode: FREEPLAY

# --- 人数 ---
min-players: 1      # 1人から即開始
max-players: 32
countdown: 0        # カウントダウンなし（即開始）

# --- ロビー ---
lobby:
  world: world
  x: 0.5
  y: 64.0
  z: 0.5
  yaw: 0.0

# --- アリーナ ---
arena:
  world: pvp_world
  spawns:
    - { x: 10.5, y: 65.0, z: 10.5, yaw: 180.0 }
    - { x: -10.5, y: 65.0, z: 10.5, yaw: 0.0 }
    - { x: 10.5, y: 65.0, z: -10.5, yaw: 90.0 }
    - { x: -10.5, y: 65.0, z: -10.5, yaw: 270.0 }

# --- 戦闘 ---
combat:
  friendly-fire: true   # FREEPLAYは全員が敵
  respawn: false        # StateValidator が自動処理（FREEPLAY専用ロジック）
  allow-building: false

# --- アイテム ---
kit: starter_kit         # スポーン時に渡すキット

# --- 勝利条件 ---
win-condition:
  type: NONE             # 勝利なし（FREEPLAYは自動終了しない）
  time-limit: 0          # 時間制限なし

# --- スコアボード ---
scoreboard:
  title: "&b&lFreePlay"
  update-interval: 2
  lines:
    - ""
    - "&fキル: &a{kills}"
    - "&fデス: &c{deaths}"
    - ""
    - "&7スロット8のコンパスで退出"
    - ""

# --- イベント ---
events:
  on-game-start:
    - broadcast: "&b&lFreePlayエリアへようこそ！ &7スロット8のコンパスで退出できます。"

  on-player-join:
    - send-message: "&7アリーナに参加しました。"

  on-kill:
    - send-message: "&a+1 キル！ &7(&f{victim} &7を倒した)"
    - play-sound: "ENTITY_EXPERIENCE_ORB_PICKUP 1.0 1.2"
