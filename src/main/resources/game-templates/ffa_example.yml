# ============================================================
# PvP Framework — FFA テンプレート
# このファイルをコピーして plugins/PvPFramework/games/ に置いてください
# または: /pvpf template copy ffa_example <新しいゲームID>
# ============================================================

id: ffa_example           # ← ユニークなIDに変更してください
display-name: "FFA ゲーム"
mode: FFA                 # 変更しない（FFA / TDM / LAST_STANDING）

# ========== 人数・タイミング ==========
min-players: 2            # ゲーム開始に必要な最小人数
max-players: 16
countdown: 30             # カウントダウン秒数

# ========== 待機場所 ==========
# game参加後〜カウントダウン完了まで集まる場所
# world を省略すると config.yml の default-world を使用
lobby:
  # world: lobby_world    # ← 別ワールドにする場合はコメントを外す
  x: 0.5
  y: 64.0
  z: 0.5

# ========== アリーナ ==========
# 直接書く場合はこのブロックを使う
# 別ファイルを参照する場合は arena-ref: を使う（下のコメント参照）
# arena-ref: ffa_arena1   # ← arenas/*.yml のIDを指定する場合

arena:
  # world: pvp_world      # ← 別ワールドにする場合はコメントを外す
  spawns:
    - x: 10.5
      y: 65.0
      z: 10.5
      yaw: 180.0
    - x: -10.5
      y: 65.0
      z: -9.5
      yaw: 0.0
    - x: 10.5
      y: 65.0
      z: -9.5
      yaw: 90.0
    - x: -10.5
      y: 65.0
      z: 10.5
      yaw: 270.0
  bounds:                 # 省略可: 境界外に出たらゲームから除外
    min: {x: -50, y: 60, z: -50}
    max: {x: 50, y: 100, z: 50}

# ========== 勝利条件 ==========
win-condition:
  type: KILLS             # KILLS=キル数 / TIME=制限時間 / SCORE=スコア
  target: 20              # KILLSの場合: 何キルで勝利
  time-limit: 300         # 秒数（TIMEの場合の制限時間、KILLSでも上限として機能）

# ========== アイテム ==========
kit: warrior              # kits/*.yml のID
respawn-kit: warrior      # リスポーン時に付与するキット（省略時はkitと同じ）

# ========== 戦闘設定 ==========
combat:
  friendly-fire: false    # チームメイトへのダメージ（FFAでは無関係）
  respawn: true           # デス後にリスポーンするか
  respawn-delay: 3        # リスポーンまでの秒数

# ========== スコアボード ==========
scoreboard:
  title: "&b&lFFA"
  update-interval: 10     # 更新間隔（tick）
  lines:
    - ""
    - "&fキル: &a{kills}"
    - "&fデス: &c{deaths}"
    - "&fKDR: &e{kdr}"
    - ""
    - "&f残り時間: &b{time_left}"
    - "&f参加人数: &b{player_count}"
    - ""

# ========== イベントスクリプト ==========
# 各イベントで実行するアクションを記述する
events:
  on-game-start:
    - broadcast: "&b&lゲーム開始！"
    - play-sound: ENTITY_ENDER_DRAGON_GROWL 1.0 1.0

  on-player-join:
    - send-message: "&aゲームに参加しました！カウントダウンを待ってください。"

  on-countdown:
    - send-title: '"" "&e{countdown}..." 0 22 0'

  on-kill:
    - give-item: GOLDEN_APPLE 1
    - send-message: "&a+1キル！ (計 {kills} キル)"

  on-death:
    - respawn:

  on-game-end:
    - broadcast: '&a{winner} が勝利！ &7({kills}キル)'
    - send-title: '"&a{winner} WIN!" "&7お疲れ様でした" 10 80 20'
