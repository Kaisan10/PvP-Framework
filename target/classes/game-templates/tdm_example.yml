# ============================================================
# PvP Framework — TDM テンプレート
# このファイルをコピーして plugins/PvPFramework/games/ に置いてください
# または: /pvpf template copy tdm_example <新しいゲームID>
# ============================================================

id: tdm_example
display-name: "チーム対戦"
mode: TDM                 # チーム戦モード

min-players: 4
max-players: 16
countdown: 30

lobby:
  x: 0.5
  y: 64.0
  z: 0.5

arena:
  spawns:
    - x: 20.5
      y: 65.0
      z: 0.5
      yaw: 270.0
    - x: -20.5
      y: 65.0
      z: 0.5
      yaw: 90.0
    - x: 20.5
      y: 65.0
      z: 5.5
      yaw: 270.0
    - x: -20.5
      y: 65.0
      z: -5.5
      yaw: 90.0
  bounds:
    min: {x: -60, y: 60, z: -30}
    max: {x: 60, y: 100, z: 30}

win-condition:
  type: KILLS
  target: 30              # チームとして30キルで勝利
  time-limit: 600         # 10分

kit: warrior
respawn-kit: warrior

combat:
  friendly-fire: false    # TDMでは false 推奨
  respawn: true
  respawn-delay: 3

scoreboard:
  title: "&c&lチーム戦"
  update-interval: 10
  lines:
    - ""
    - "&fキル: &a{kills}"
    - "&fデス: &c{deaths}"
    - ""
    - "&f残り時間: &b{time_left}"
    - "&f参加人数: &b{player_count}"
    - ""

events:
  on-game-start:
    - broadcast: "&c&lチーム戦 開始！"
    - play-sound: ENTITY_ENDER_DRAGON_GROWL 1.0 1.0

  on-player-join:
    - send-message: "&aゲームに参加しました！カウントダウンを待ってください。"

  on-countdown:
    - send-title: '"" "&e{countdown}..." 0 22 0'

  on-kill:
    - send-message: "&a+1キル！"

  on-death:
    - respawn:

  on-game-end:
    - broadcast: '&a{winner} チームが勝利！'
    - send-title: '"&aVICTORY!" "&7お疲れ様でした" 10 80 20'
